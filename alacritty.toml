[terminal.shell]
program = "/bin/zsh"

[window]
dimensions = { columns = 40, lines = 32 }
position = { x = 500, y = 500 }
padding = { x = 0, y = 0 }
opacity = 0.7
title = "Input Display"
dynamic_padding = false

[font]
size = 24
normal = { family = "Cica", style = "Regular" }
bold = { family = "Cica", style = "Bold" }
italic = { family = "Cica", style = "Regular" }
bold_italic = { family = "Cica", style = "Bold" }

[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1.0"

[colors.primary]
# background = "#00ff00"
