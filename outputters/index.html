<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Input History</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: monospace;
    font-size: 15px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 1.5rem;
    gap: 0;
  }
  .entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 3px 0;
    border-bottom: 1px solid #2a2a2a;
    width: 280px;
  }
  .entry.live {
    color: #fff;
    border-bottom: 1px solid #444;
    margin-bottom: 4px;
  }
  .frames {
    width: 36px;
    text-align: right;
    color: #888;
    flex-shrink: 0;
  }
  .entry.live .frames { color: #ccc; }
  .arrow {
    width: 24px;
    text-align: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .btn {
    font-size: 11px;
    font-weight: bold;
    padding: 1px 6px;
    border-radius: 3px;
    color: #fff;
  }
  .btn-A  { background: #3fa96a; }
  .btn-B  { background: #d44; }
  .btn-X  { background: #4a8fd4; }
  .btn-Y  { background: #c8a020; }
  .btn-LB { background: #7c5fc8; }
  .btn-RB { background: #c86030; }
  .btn-LT { background: #2099b0; }
  .btn-RT { background: #b040a0; }
  .btn-START, .btn-BACK { background: #666; }
  .status {
    font-size: 11px;
    color: #555;
    margin-top: 1rem;
  }
</style>
</head>
<body>

<div class="entry live" id="live">
  <div class="frames" id="live-frames">0</div>
  <div class="arrow" id="live-arrow">·</div>
  <div class="btns" id="live-btns"></div>
</div>

<div id="history"></div>
<div class="status" id="status">connecting...</div>

<script>
const HISTORY_SIZE = 10;
const history = [];

function btnsHtml(btns) {
  return btns.map(b => `<span class="btn btn-${b}">${b}</span>`).join('');
}

function renderHistory() {
  const el = document.getElementById('history');
  el.innerHTML = history.slice(0, HISTORY_SIZE).map(e =>
    `<div class="entry">
      <div class="frames">${e.hold}</div>
      <div class="arrow">${e.arrow}</div>
      <div class="btns">${btnsHtml(e.btns)}</div>
    </div>`
  ).join('');
}

const ws = new WebSocket('ws://localhost:8000/ws');

ws.onopen = () => {
  document.getElementById('status').textContent = 'connected';
};

ws.onclose = () => {
  document.getElementById('status').textContent = 'disconnected';
};

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);

  if (data.type === 'frame') {
    document.getElementById('live-frames').textContent = data.hold;
    document.getElementById('live-arrow').textContent = data.arrow;
    document.getElementById('live-btns').innerHTML = btnsHtml(data.btns);
  } else if (data.type === 'update') {
    history.unshift(data);
    renderHistory();
  }
};
</script>
</body>
</html>
